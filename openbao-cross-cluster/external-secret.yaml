apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-secret
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # ExternalSecret 먼저 (SecretSynced 후 앱 배포)
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: demo-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: app/demo
