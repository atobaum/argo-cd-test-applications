apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-secret
  namespace: demo
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: demo-secret
    creationPolicy: Owner
  data:
    - secretKey: GREETING
      remoteRef:
        key: app/demo
        property: GREETING
