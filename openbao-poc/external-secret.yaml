apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-secret
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # 먼저: OpenBao→K8s Secret 동기화 (ESO health check로 SecretSynced 대기)
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: demo-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: app/demo   # secret/app/demo의 모든 키-값을 K8s Secret으로 추출
